<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHATTING SITE - Secure Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>MWAMINI CHATTING SITE</h3>
                <div class="user-profile-tag">
                    <span id="user-display-name">Loading...</span> 
                    <span id="presence-badge" class="badge offline">●</span>
                </div>
                <div class="header-actions">
                    <button id="view-status-btn">🟢 MWAMINI Statuses</button>
                    <button id="open-status-creator-btn">📝 Post Text Status</button>
                    <button id="logout-btn">Sign Out</button>
                </div>
            </div>

            <form id="create-group-form">
                <input type="text" id="new-group-name" placeholder="Create high-secure group..." required>
                <button type="submit">Create</button>
            </form>

            <div class="groups-list" id="groups-container"></div>
        </div>

        <div class="chat-area" id="chat-area-fallback">
            <div class="no-chat-message">
                <h2>Welcome to MWAMINI CHATTING SITE</h2>
                <p>Pick a group to request access, or manage your creations.</p>
            </div>
        </div>

        <div class="chat-area hidden" id="chat-area-active">
            <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 id="active-group-title">Group Name</h3>
                    <p id="group-role-indicator" style="font-size: 11px; color: #6b7280;"></p>
                </div>
                <div id="creator-admin-panel" class="hidden">
                    <button id="view-requests-btn" style="background:#4f46e5; color:white; border:none; padding:5px 10px; border-radius:4px; font-size:12px; cursor:pointer;">
                        Manage Join Requests (<span id="request-count">0</span>)
                    </button>
                </div>
            </div>
            
            <div class="messages-container" id="messages-display"></div>

            <form id="send-message-form">
                <input type="file" id="message-file-input">
                <input type="text" id="message-text-input" placeholder="Type verified encrypted message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>

    </div>

    <div id="requests-modal" class="modal hidden">
        <div class="modal-content" style="background: white; color: #333; text-align: left;">
            <span class="close-modal" id="close-requests-modal-btn">&times;</span>
            <h3 style="margin-bottom: 15px; color: #008069;">Pending Join Approvals</h3>
            <div id="requests-list-container" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>
    </div>

    <div id="status-creator-modal" class="modal hidden">
        <div class="modal-content" style="background: white; color: #333;">
            <span class="close-modal" id="close-status-creator-btn">&times;</span>
            <h3 style="color: #008069; margin-bottom: 10px;">Post a Text MWAMINI Status</h3>
            <p style="font-size: 12px; color: #555; margin-bottom: 15px;">Visible to verified users for exactly 48 Hours</p>
            <textarea id="status-text-content" placeholder="What's on your mind?..." rows="4" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc; font-family:inherit; resize:none;"></textarea>
            <button id="submit-text-status-btn" style="margin-top:15px; background:#00a884; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; width:100%;">Post Status</button>
        </div>
    </div>

    <div id="status-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-modal-btn">&times;</span>
            <h2>Active MWAMINI Status Updates (48 Hours)</h2>
            <div class="status-grid" id="status-viewer-grid"></div>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.1/firebase-storage.js"
        }
      }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
